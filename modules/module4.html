<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Module 04 — HR Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="../config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06060f;--bg2:#0d0d1a;--surface:#1a1a2e;--border:#ffffff12;--border2:#ffffff1e;--cyan:#00d4ff;--green:#22c55e;--red:#ef4444;--text:#f0f0ff;--text2:#a0a0c0;--text3:#60607a;--fd:'Syne',sans-serif;--fm:'JetBrains Mono',monospace;--fb:'DM Sans',sans-serif;--r:12px}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh}
nav{position:sticky;top:0;z-index:100;background:rgba(6,6,15,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{font-family:var(--fd);font-size:1.1rem;font-weight:800}
.nav-logo span{color:var(--cyan)}
.nav-links a{font-size:.82rem;color:var(--text2);text-decoration:none;margin-left:1.5rem}
.container{max-width:900px;margin:0 auto;padding:3rem 2rem}
.header{text-align:center;margin-bottom:3rem}
.header h1{font-family:var(--fd);font-size:2.2rem;font-weight:800;margin-bottom:.75rem}
.header h1 span{color:var(--cyan)}
.chat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);height:500px;overflow-y:auto;padding:1.5rem;margin-bottom:1rem}
.message{margin-bottom:1.5rem;max-width:80%}
.message.hr{background:var(--surface);padding:1rem;border-radius:var(--r);margin-left:0;border-left:3px solid var(--cyan)}
.message.user{background:rgba(0,212,255,.1);padding:1rem;border-radius:var(--r);margin-left:auto;margin-right:0;text-align:right;border-right:3px solid var(--cyan)}
.input-area{display:flex;gap:1rem}
.input-area input{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:12px;color:var(--text);font-family:var(--fb)}
.btn{padding:12px 24px;background:var(--cyan);color:#000;border:none;border-radius:var(--r);font-family:var(--fm);font-size:.85rem;font-weight:500;cursor:pointer}
.btn:hover{transform:translateY(-2px)}
.controls{text-align:center;margin-bottom:2rem}
.mic-btn{width:60px;height:60px;border-radius:50%;background:var(--red);border:none;font-size:1.5rem;cursor:pointer;transition:all .2s}
.mic-btn:hover{transform:scale(1.1)}
.mic-btn.active{background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.7)}50%{box-shadow:0 0 0 10px rgba(34,197,94,0)}}
#report{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:2rem;display:none;margin-top:2rem}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Intelli<span>Hire</span></div>
  <div class="nav-links">
    <a href="../index.html">Home</a>
    <a href="../about.html">About</a>
  </div>
</nav>

<div class="container">
  <div class="header">
    <h1>Module 04 — <span>HR Simulator</span></h1>
    <p>Voice-enabled HR interview with AI feedback</p>
  </div>

  <div class="controls">
    <button class="mic-btn" id="micBtn" onclick="toggleVoice()">🎤</button>
    <p style="margin-top:1rem;font-size:.85rem;color:var(--text3)">Click to start voice interview</p>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="message hr">
      <p>Hello! I'm your HR interviewer. Click the microphone to start, or type below. Tell me about yourself.</p>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type your response...">
    <button class="btn" onclick="sendMessage()">Send</button>
  </div>

  <div id="report"></div>
</div>

<script>
let recognition;
let isListening = false;
let conversationHistory = [];
let fillerWords = 0;

if ('webkitSpeechRecognition' in window) {
  recognition = new webkitSpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = false;
  
  recognition.onresult = (event) => {
    const transcript = event.results[event.results.length - 1][0].transcript;
    document.getElementById('userInput').value = transcript;
    sendMessage();
  };
}

function toggleVoice() {
  const btn = document.getElementById('micBtn');
  if (!recognition) {
    alert('Voice recognition not supported');
    return;
  }
  
  if (isListening) {
    recognition.stop();
    btn.classList.remove('active');
    isListening = false;
  } else {
    recognition.start();
    btn.classList.add('active');
    isListening = true;
  }
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  
  addMessage(text, 'user');
  input.value = '';
  
  // Count filler words
  const fillers = ['um', 'uh', 'like', 'you know', 'actually', 'basically'];
  fillers.forEach(f => {
    if (text.toLowerCase().includes(f)) fillerWords++;
  });
  
  conversationHistory.push({ role: 'user', content: text });
  
  const result = await callAI([...conversationHistory], 
    'You are an HR interviewer. Ask STAR-method questions. Keep responses under 50 words.');
  
  const reply = result.content[0].text;
  conversationHistory.push({ role: 'assistant', content: reply });
  
  addMessage(reply, 'hr');
  
  if (conversationHistory.length >= 10) {
    generateReport();
  }
}

function addMessage(text, type) {
  const chatBox = document.getElementById('chatBox');
  const msg = document.createElement('div');
  msg.className = `message ${type}`;
  msg.innerHTML = `<p>${text}</p>`;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function generateReport() {
  const fullTranscript = conversationHistory
    .filter(m => m.role === 'user')
    .map(m => m.content)
    .join(' ');
  
  const wordCount = fullTranscript.split(' ').length;
  const fluencyScore = Math.max(0, 100 - (fillerWords * 10));
  
  const result = await callAI([{
    role: 'user',
    content: `Analyze this interview transcript and provide scores (0-100) for: Communication, STAR Method Usage, Confidence. Return JSON only: {"communication":N,"star":N,"confidence":N,"feedback":"brief"}\n\n${fullTranscript}`
  }], 'Return only JSON.');
  
  const scores = JSON.parse(result.content[0].text.replace(/```json|```/g, '').trim());
  
  document.getElementById('report').innerHTML = `
    <h2 style="font-family:var(--fd);margin-bottom:1.5rem">Interview Report</h2>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem">
      <div style="text-align:center">
        <div style="font-size:2rem;font-weight:800;color:var(--cyan)">${scores.communication}</div>
        <div style="font-size:.8rem;color:var(--text3)">Communication</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:2rem;font-weight:800;color:var(--cyan)">${scores.star}</div>
        <div style="font-size:.8rem;color:var(--text3)">STAR Method</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:2rem;font-weight:800;color:var(--cyan)">${scores.confidence}</div>
        <div style="font-size:.8rem;color:var(--text3)">Confidence</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:2rem;font-weight:800;color:var(--cyan)">${fluencyScore}</div>
        <div style="font-size:.8rem;color:--text3)">Fluency</div>
      </div>
    </div>
    <div style="background:var(--surface);padding:1rem;border-radius:var(--r)">
      <p style="font-size:.9rem;line-height:1.7">${scores.feedback}</p>
    </div>
  `;
  document.getElementById('report').style.display = 'block';
}

document.getElementById('userInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') sendMessage();
});
</script>

</body>
</html>
